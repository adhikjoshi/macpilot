<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect x="36" y="36" width="440" height="440" rx="92" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.06"/>

  <!-- Outer radar ring -->
  <circle cx="256" cy="248" r="155" stroke="url(#ring)" stroke-width="8" fill="none" opacity="0.25"/>

  <!-- Inner radar ring -->
  <circle cx="256" cy="248" r="110" stroke="url(#ring)" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Radar sweep lines -->
  <line x1="256" y1="93" x2="256" y2="138" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="358" x2="256" y2="403" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="101" y1="248" x2="146" y2="248" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="366" y1="248" x2="411" y2="248" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Diagonal ticks -->
  <line x1="148" y1="140" x2="175" y2="167" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="364" y1="140" x2="337" y2="167" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="148" y1="356" x2="175" y2="329" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="364" y1="356" x2="337" y2="329" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Upward arrow / autopilot needle -->
  <path d="M 256 130 L 290 280 L 270 260 L 256 310 L 242 260 L 222 280 Z"
        fill="url(#arrow)" opacity="0.95"/>

  <!-- Center glow dot -->
  <circle cx="256" cy="248" r="20" fill="url(#glow)"/>
  <circle cx="256" cy="248" r="8" fill="#22d3ee"/>

  <!-- Command key symbol (small, bottom right) -->
  <g transform="translate(320, 330) scale(0.55)" opacity="0.7">
    <rect x="0" y="16" width="32" height="32" rx="10" stroke="#a5b4fc" stroke-width="4" fill="none"/>
    <rect x="32" y="16" width="32" height="32" rx="10" stroke="#a5b4fc" stroke-width="4" fill="none"/>
    <rect x="0" y="-16" width="32" height="32" rx="10" stroke="#a5b4fc" stroke-width="4" fill="none"/>
    <rect x="32" y="-16" width="32" height="32" rx="10" stroke="#a5b4fc" stroke-width="4" fill="none"/>
  </g>

  <!-- MacPilot text -->
  <text x="256" y="465" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-weight="600" font-size="34" fill="#e2e8f0" letter-spacing="2" opacity="0.45">MacPilot</text>
</svg>
